# Daily scan of darwin channels (stable + unstable) for the
# NixOS/nixpkgs#507531 / NixOS/nix#15638 page-hash bug.
#
# Companion scripts:
#   ./scripts/{scan-darwin-cache,aggregate-scan,verify-failures,
#              compute-load-time-dependents,compute-build-time-dependents,
#              render-channel-report,combine-reports}.py
#
# Behavior:
#   * Daily 07:00 UTC (channels typically bump 00:00-06:00 UTC, so we run after).
#   * Matrix scans `stable` and `unstable` in parallel. Per-channel state DB
#     and JSONL live under `<channel>/` subdirs both in the runner workspace
#     and in GHA cache (per-channel cache keys prevent cross-leg clobber even
#     on independent re-runs).
#   * Per channel, three tiers of analysis produce per-tier CSVs:
#       Tier 1 (direct):           direct-failing.csv        from aggregate-scan.py
#       Tier 2 (load-time transitive): load-time-dependents.csv  from compute-load-time-dependents.py
#       Tier 3 (build-time dependent): build-time-dependents.csv from compute-build-time-dependents.py
#     Tier-3 evaluation needs `nix-eval-jobs` against the channel's nixpkgs
#     revision (metadata-only, no building).
#   * Per-channel REPORT.md is assembled by render-channel-report.py, which
#     splices Tier 2 + Tier 3 sections into aggregate-scan.py's Tier 1
#     report.
#   * A final `combine` job downloads both matrix legs' artifacts and emits
#     top-level `REPORT.md` + `summary.json` via combine-reports.py, then
#     commits everything in one push.
#
# Required repo setting: Settings → Actions → General → Workflow permissions
# = "Read and write". Otherwise the combine job's commit step will 403.

name: scan

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      force_full_rescan:
        description: 'Ignore cached state DB and rescan from scratch'
        type: boolean
        default: false

concurrency:
  group: scan
  cancel-in-progress: true

jobs:
  scan:
    name: scan-${{ matrix.channel.label }}
    runs-on: ubuntu-latest
    # Daily delta scans finish in minutes; cold `force_full_rescan=true`
    # against the full channel has empirically taken ~2 h (stable) /
    # ~4 h (unstable) with the 5×48 concurrency knob below. Give 12 h
    # of headroom.
    timeout-minutes: 720
    permissions:
      contents: read
      actions: write    # cache-nix-action's purge step
    strategy:
      fail-fast: false
      matrix:
        channel:
          - label: stable
            url: https://channels.nixos.org/nixpkgs-25.11-darwin
          - label: unstable
            url: https://channels.nixos.org/nixpkgs-unstable

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache /nix/store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('.github/workflows/scan.yml') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2147483648   # 2 GiB cap
          purge: true
          purge-created: 604800                 # 7 days

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          cache-dependency-glob: 'scripts/*.py'

      - name: Install rcodesign + nix-eval-jobs
        run: nix profile install nixpkgs#rcodesign nixpkgs#nix-eval-jobs

      - name: Restore scanner state (${{ matrix.channel.label }})
        if: ${{ !inputs.force_full_rescan }}
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ matrix.channel.label }}/full.db
            ${{ matrix.channel.label }}/full.db-shm
            ${{ matrix.channel.label }}/full.db-wal
            ${{ matrix.channel.label }}/full.jsonl
          key: scan-state-${{ matrix.channel.label }}-${{ github.run_id }}
          # Per-channel prefix: a stable-leg restore can never pick up an
          # unstable-leg save by accident.
          restore-keys: |
            scan-state-${{ matrix.channel.label }}-

      - name: Channel metadata
        id: channel
        run: |
          URL="${{ matrix.channel.url }}"
          REV=$(curl -sL "$URL/git-revision")
          echo "url=$URL"  >> "$GITHUB_OUTPUT"
          echo "rev=$REV"  >> "$GITHUB_OUTPUT"
          echo "label=${URL##*/} @ ${REV:0:12} ($(date -u +%Y-%m-%d))" >> "$GITHUB_OUTPUT"

      - name: Scan (${{ matrix.channel.label }})
        run: |
          mkdir -p ${{ matrix.channel.label }}
          uv run scripts/scan-darwin-cache.py \
            --channel "${{ steps.channel.outputs.url }}" \
            --workers 5 \
            --per-worker-concurrency 48 \
            --batch-size 100 \
            --state ${{ matrix.channel.label }}/full.db \
            --out ${{ matrix.channel.label }}/full.jsonl \
            --log-level INFO

      - name: Aggregate Tier 1 (${{ matrix.channel.label }})
        run: |
          uv run scripts/aggregate-scan.py ${{ matrix.channel.label }}/full.jsonl \
            --out ${{ matrix.channel.label }}/REPORT.md \
            --summary-json ${{ matrix.channel.label }}/summary.json \
            --direct-failing-csv ${{ matrix.channel.label }}/direct-failing.csv \
            --channel-label '${{ steps.channel.outputs.label }}'

      - name: Compute Tier 2 load-time dependents (${{ matrix.channel.label }})
        run: |
          uv run scripts/compute-load-time-dependents.py \
            ${{ matrix.channel.label }}/full.jsonl \
            ${{ matrix.channel.label }}/direct-failing.csv \
            --out-csv ${{ matrix.channel.label }}/load-time-dependents.csv \
            --out-summary ${{ matrix.channel.label }}/load-time-summary.json \
            --out-section ${{ matrix.channel.label }}/load-time-section.md

      - name: Compute Tier 3 build-time dependents (${{ matrix.channel.label }})
        run: |
          uv run scripts/compute-build-time-dependents.py \
            --nixpkgs-flake github:nixos/nixpkgs/${{ steps.channel.outputs.rev }} \
            --direct-failing-csv ${{ matrix.channel.label }}/direct-failing.csv \
            --out-csv ${{ matrix.channel.label }}/build-time-dependents.csv \
            --out-summary ${{ matrix.channel.label }}/build-time-summary.json \
            --out-section ${{ matrix.channel.label }}/build-time-section.md \
            --eval-workers 6

      - name: Render channel REPORT with all tier sections (${{ matrix.channel.label }})
        run: |
          uv run scripts/render-channel-report.py \
            --report ${{ matrix.channel.label }}/REPORT.md \
            --tier2-section ${{ matrix.channel.label }}/load-time-section.md \
            --tier3-section ${{ matrix.channel.label }}/build-time-section.md \
            --tier2-summary ${{ matrix.channel.label }}/load-time-summary.json \
            --tier3-summary ${{ matrix.channel.label }}/build-time-summary.json

      - name: Verify scanner findings (${{ matrix.channel.label }})
        run: |
          uv run scripts/verify-failures.py \
            --failing-csv ${{ matrix.channel.label }}/direct-failing.csv \
            --jsonl ${{ matrix.channel.label }}/full.jsonl \
            --out ${{ matrix.channel.label }}/verify-results.jsonl \
            --summary ${{ matrix.channel.label }}/verify-summary.md

      - name: Save scanner state (${{ matrix.channel.label }})
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ matrix.channel.label }}/full.db
            ${{ matrix.channel.label }}/full.db-shm
            ${{ matrix.channel.label }}/full.db-wal
            ${{ matrix.channel.label }}/full.jsonl
          key: scan-state-${{ matrix.channel.label }}-${{ github.run_id }}

      - name: Upload outputs (${{ matrix.channel.label }})
        uses: actions/upload-artifact@v4
        with:
          name: channel-${{ matrix.channel.label }}
          path: ${{ matrix.channel.label }}/
          retention-days: 30

      - name: Fail loudly if scanner ↔ verifier disagree (${{ matrix.channel.label }})
        run: |
          if grep -q '^No disagreements' ${{ matrix.channel.label }}/verify-summary.md; then
            echo 'scanner ↔ verifier: 100% agreement'
          else
            echo '::error::Scanner-verifier disagreement detected in ${{ matrix.channel.label }}. See verify-summary.md.'
            exit 1
          fi

  combine:
    name: combine + commit
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest
          cache-dependency-glob: 'scripts/*.py'

      - name: Download stable outputs
        uses: actions/download-artifact@v4
        with:
          name: channel-stable
          path: stable/

      - name: Download unstable outputs
        uses: actions/download-artifact@v4
        with:
          name: channel-unstable
          path: unstable/

      - name: Combine
        run: |
          uv run scripts/combine-reports.py \
            --channel stable:stable/summary.json \
            --channel unstable:unstable/summary.json \
            --channel-tier2 stable:stable/load-time-summary.json \
            --channel-tier2 unstable:unstable/load-time-summary.json \
            --channel-tier3 stable:stable/build-time-summary.json \
            --channel-tier3 unstable:unstable/build-time-summary.json \
            --out REPORT.md \
            --summary-json summary.json

      - name: Commit outputs
        run: |
          git config user.name  'scan-bot'
          git config user.email 'scan-bot@users.noreply.github.com'
          git add stable/ unstable/ REPORT.md summary.json
          if git diff --staged --quiet; then
            echo 'no result changes'
            exit 0
          fi
          git commit -m "auto: dual-channel scan

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push
