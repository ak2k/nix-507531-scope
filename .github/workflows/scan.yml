# Daily scan of darwin caches for NixOS/nixpkgs#507531 / NixOS/nix#15638.
#
# Three channels, each emits its own per-channel report:
#
#   `darwin`   — `https://channels.nixos.org/nixpkgs-25.11-darwin`. Hydra's
#                darwin-curated stable channel; lags release-25.11 tip on
#                darwin test-gate failures. Currently the poisoned channel.
#   `release`  — synthetic. `release-25.11` branch tip is not a published
#                channel slug, so we evaluate
#                  github:NixOS/nixpkgs/<release-25.11-tip>#legacyPackages.aarch64-darwin
#                via nix-eval-jobs in a pre-job and feed the resulting
#                /nix/store path list to scan-darwin-cache.py via
#                --paths-file. Same Tier 1 pipeline as the other channels.
#   `unstable` — `https://channels.nixos.org/nixpkgs-unstable`. Trunk-
#                combined unstable, all platforms; aarch64-darwin slice
#                of fish there is on 4.6.0.
#
# Architecture: four jobs in sequence.
#
#   eval-release-paths (1 job, ~10-15 min):
#     * `git ls-remote release-25.11` → release_rev
#     * `nix-eval-jobs --workers 2 --max-memory-size 3072 ...` → direct
#       outputs.* per attr (~107K /nix/store paths, ~5-8 min).
#       Parallelism mirrors compute-build-time-dependents.py's existing
#       Tier 3 invocation; ubuntu-latest is 2 vCPU so 2 workers matches
#       core count without overcommitting.
#     * scripts/expand-closure.py → BFS expansion via cache.nixos.org
#       narinfo.References (~107K → ~170K paths, ~3-5 min). Without this
#       step, Tier 2 LC_LOAD_DYLIB classification underreports and Tier 1
#       misses runtime-only dylibs; with it, the synthetic release lane
#       reaches parity with what Hydra publishes in store-paths.xz.
#     * Uploads release-paths.txt + release-rev.txt as artifacts. Single
#       run shared by all 7 release-channel scan shards (no redundant
#       per-shard re-eval or re-expansion).
#
#   scan (matrix, 17 parallel jobs):
#     * darwin   split into 3 shards (was 6 under the 2-channel layout;
#                rebalanced for 17-job total)
#     * release  split into 7 shards
#     * unstable split into 7 shards (was 14; rebalanced for 17-job total)
#     Each shard scans paths[i] where i %% total_shards == shard_id.
#     17 < GHA's 20-concurrent-runner cap. Per-shard state cached
#     independently so a timeout in one shard doesn't leak into others.
#     Release shards `needs: eval-release-paths` and download its artifact.
#
#   analyze (matrix, 1 job per channel):
#     * downloads all shard artifacts for one channel
#     * concatenates JSONLs into the per-channel full.jsonl
#     * runs Tier 1 / Tier 2 / Tier 3 / render / verify in sequence
#     * Tier 3 evaluates against the channel's pinned rev (release uses
#       the rev from eval-release-paths' artifact; the other two pull
#       from <channel-url>/git-revision)
#     * uploads per-channel artifact
#
#   combine (1 job):
#     * downloads all three channels' artifacts
#     * runs combine-reports.py (top-level REPORT + summary.json with the
#       flat Affected-packages table)
#     * commits + pushes
#
# Companion scripts:
#   ./scripts/{scan-darwin-cache,eval-darwin-paths,expand-closure,
#              aggregate-scan,verify-failures,compute-load-time-dependents,
#              compute-build-time-dependents,render-channel-report,
#              combine-reports}.py
#
# Required repo setting: Settings → Actions → General → Workflow permissions
# = "Read and write". Otherwise the combine job's commit step will 403.

name: scan

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      force_full_rescan:
        description: 'Ignore cached shard state and rescan from scratch'
        type: boolean
        default: false

concurrency:
  group: scan
  cancel-in-progress: true

jobs:
  eval-release-paths:
    # Pin release-25.11 tip rev once, then synthesise its
    # legacyPackages.aarch64-darwin path list via nix-eval-jobs. Single
    # run shared by all 7 release-channel scan shards.
    name: eval-release-paths
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      release_rev: ${{ steps.pin.outputs.rev }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest
          cache-dependency-glob: 'scripts/*.py'

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install nix-eval-jobs
        run: nix profile install nixpkgs#nix-eval-jobs

      - name: Pin release-25.11 tip
        id: pin
        run: |
          REV=$(git ls-remote https://github.com/NixOS/nixpkgs release-25.11 | awk '{print $1}')
          if [ -z "$REV" ]; then
            echo "::error::failed to resolve release-25.11"
            exit 1
          fi
          echo "rev=$REV" >> "$GITHUB_OUTPUT"
          echo "$REV" > release-rev.txt
          echo "release-25.11 pinned at $REV"

      - name: Evaluate aarch64-darwin package set
        env:
          # Same UNFREE/INSECURE allowlist as compute-build-time-dependents.py:
          # users with these allowed at build time DO substitute these
          # paths from cache, so they belong in the synthetic path list.
          NIXPKGS_ALLOW_UNFREE: '1'
          NIXPKGS_ALLOW_INSECURE: '1'
        run: |
          uv run scripts/eval-darwin-paths.py \
            --flake "github:NixOS/nixpkgs/${{ steps.pin.outputs.rev }}" \
            --workers 2 \
            --max-memory-size 3072 \
            > release-paths-direct.txt
          wc -l release-paths-direct.txt

      - name: Expand to runtime closure via cache.nixos.org narinfo
        # nix-eval-jobs gives only `outputs.*` per attr (~107K paths);
        # Hydra's published store-paths.xz includes the full runtime
        # closure (~170K paths) — the extra ~64K are transitive
        # narinfo.References (toolchain, libsystem stubs, shared libs).
        # Without this expansion, Tier 2 LC_LOAD_DYLIB classification
        # underreports and Tier 1 misses runtime-only-referenced dylibs.
        # Validated locally byte-identical to `nix path-info --recursive
        # --store https://cache.nixos.org`, but parallelised so we don't
        # pay the ~9h serial cost.
        run: |
          uv run scripts/expand-closure.py \
            --in release-paths-direct.txt \
            --out release-paths.txt \
            --concurrency 64
          wc -l release-paths-direct.txt release-paths.txt

      - name: Upload release-paths artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-paths
          path: |
            release-paths.txt
            release-rev.txt
          retention-days: 1

  scan:
    name: scan-${{ matrix.channel }}-shard${{ matrix.shard }}of${{ matrix.total_shards }}
    needs: eval-release-paths
    runs-on: ubuntu-latest
    # GHA's hard per-job cap on public-repo hosted runners is 6h.
    # Each shard covers ~1/N of the channel so cold-scan stays well
    # under this; leaving at the cap for slack.
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # 17 total shards: darwin×3 + release×7 + unstable×7. Under GHA's
        # 20-concurrent-runner cap. Listed explicitly (GHA has no runtime
        # expansion; include + a separate job per channel was the next-
        # cleanest alternative). When changing shard counts, update BOTH
        # the include list and the `total_shards` field on every entry of
        # that channel. `release` entries have an empty `url` — they read
        # paths from the eval-release-paths artifact instead of fetching
        # store-paths.xz from channels.nixos.org.
        include:
          - { channel: darwin, url: 'https://channels.nixos.org/nixpkgs-25.11-darwin', shard: 0, total_shards: 3 }
          - { channel: darwin, url: 'https://channels.nixos.org/nixpkgs-25.11-darwin', shard: 1, total_shards: 3 }
          - { channel: darwin, url: 'https://channels.nixos.org/nixpkgs-25.11-darwin', shard: 2, total_shards: 3 }
          - { channel: release, url: '', shard: 0, total_shards: 7 }
          - { channel: release, url: '', shard: 1, total_shards: 7 }
          - { channel: release, url: '', shard: 2, total_shards: 7 }
          - { channel: release, url: '', shard: 3, total_shards: 7 }
          - { channel: release, url: '', shard: 4, total_shards: 7 }
          - { channel: release, url: '', shard: 5, total_shards: 7 }
          - { channel: release, url: '', shard: 6, total_shards: 7 }
          - { channel: unstable, url: 'https://channels.nixos.org/nixpkgs-unstable', shard: 0, total_shards: 7 }
          - { channel: unstable, url: 'https://channels.nixos.org/nixpkgs-unstable', shard: 1, total_shards: 7 }
          - { channel: unstable, url: 'https://channels.nixos.org/nixpkgs-unstable', shard: 2, total_shards: 7 }
          - { channel: unstable, url: 'https://channels.nixos.org/nixpkgs-unstable', shard: 3, total_shards: 7 }
          - { channel: unstable, url: 'https://channels.nixos.org/nixpkgs-unstable', shard: 4, total_shards: 7 }
          - { channel: unstable, url: 'https://channels.nixos.org/nixpkgs-unstable', shard: 5, total_shards: 7 }
          - { channel: unstable, url: 'https://channels.nixos.org/nixpkgs-unstable', shard: 6, total_shards: 7 }

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest
          cache-dependency-glob: 'scripts/*.py'

      - name: Download release-paths artifact
        if: matrix.channel == 'release'
        uses: actions/download-artifact@v8
        with:
          name: release-paths
          path: release-input/

      - name: Restore scanner shard state
        if: ${{ !inputs.force_full_rescan }}
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ matrix.channel }}-shard${{ matrix.shard }}/full.db
            ${{ matrix.channel }}-shard${{ matrix.shard }}/full.db-shm
            ${{ matrix.channel }}-shard${{ matrix.shard }}/full.db-wal
            ${{ matrix.channel }}-shard${{ matrix.shard }}/full.jsonl
          # Key structure: scan-state-<channel>-shard<N>of<M>-<scanner-hash>-<run_id>.
          # Scanner-hash invalidates on any scanner change (a stale state
          # DB would mark paths as already-scanned and silently drop new
          # scanner-added fields). Shard index/count in the key prevents
          # cross-shard clobber even at the same run_id. Per-run-id suffix
          # forces a fresh save slot each run.
          key: scan-state-${{ matrix.channel }}-shard${{ matrix.shard }}of${{ matrix.total_shards }}-${{ hashFiles('scripts/scan-darwin-cache.py') }}-${{ github.run_id }}
          restore-keys: |
            scan-state-${{ matrix.channel }}-shard${{ matrix.shard }}of${{ matrix.total_shards }}-${{ hashFiles('scripts/scan-darwin-cache.py') }}-

      - name: Scan shard
        run: |
          DIR=${{ matrix.channel }}-shard${{ matrix.shard }}
          mkdir -p "$DIR"
          # `release` reads its path list from the eval-release-paths
          # artifact; the other channels fetch <url>/store-paths.xz.
          if [ '${{ matrix.channel }}' = 'release' ]; then
            SOURCE='--paths-file release-input/release-paths.txt'
          else
            SOURCE='--channel ${{ matrix.url }}'
          fi
          uv run scripts/scan-darwin-cache.py \
            $SOURCE \
            --shard ${{ matrix.shard }} \
            --total-shards ${{ matrix.total_shards }} \
            --workers 5 \
            --per-worker-concurrency 48 \
            --batch-size 100 \
            --state "$DIR/full.db" \
            --out "$DIR/full.jsonl" \
            --log-level INFO

      # Save shard state right after scan so a failure in any subsequent
      # step still preserves the scan work for the next run.
      - name: Save scanner shard state
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ matrix.channel }}-shard${{ matrix.shard }}/full.db
            ${{ matrix.channel }}-shard${{ matrix.shard }}/full.db-shm
            ${{ matrix.channel }}-shard${{ matrix.shard }}/full.db-wal
            ${{ matrix.channel }}-shard${{ matrix.shard }}/full.jsonl
          key: scan-state-${{ matrix.channel }}-shard${{ matrix.shard }}of${{ matrix.total_shards }}-${{ hashFiles('scripts/scan-darwin-cache.py') }}-${{ github.run_id }}

      - name: Upload shard JSONL
        uses: actions/upload-artifact@v7
        with:
          name: shard-${{ matrix.channel }}-${{ matrix.shard }}
          path: ${{ matrix.channel }}-shard${{ matrix.shard }}/full.jsonl
          # Only needed for the analyze job one step later; short retention.
          retention-days: 1

  analyze:
    name: analyze-${{ matrix.channel.label }}
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        channel:
          - label: darwin
            url: https://channels.nixos.org/nixpkgs-25.11-darwin
          - label: release
            url: ''  # synthetic; rev comes from eval-release-paths artifact
          - label: unstable
            url: https://channels.nixos.org/nixpkgs-unstable
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      # Deliberately NO cache-nix-action /nix/store caching. Each
      # analyze job installs nix + rcodesign + nix-eval-jobs fresh;
      # the cold install takes ~30s total and saves ~800 MB of repo-
      # cache footprint per run. With 3 analyze jobs × 1 daily run ×
      # ~800 MB, cache-nix-action was the dominant cache-usage item,
      # pushing the repo past its 10 GB cap and LRU-evicting shard
      # scan-state caches.

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest
          cache-dependency-glob: 'scripts/*.py'

      - name: Install rcodesign + nix-eval-jobs
        run: nix profile install nixpkgs#rcodesign nixpkgs#nix-eval-jobs

      - name: Download release-paths artifact (rev pin)
        if: matrix.channel.label == 'release'
        uses: actions/download-artifact@v8
        with:
          name: release-paths
          path: release-input/

      - name: Channel metadata
        id: channel
        run: |
          if [ '${{ matrix.channel.label }}' = 'release' ]; then
            # Synthetic channel: rev was pinned by eval-release-paths
            # at the start of the run. Reuse it so Tier 3 evaluates
            # against the same rev whose path list we already scanned.
            REV=$(cat release-input/release-rev.txt)
            URL="github:NixOS/nixpkgs/release-25.11"
            DISPLAY="release-25.11 @ ${REV:0:12} ($(date -u +%Y-%m-%d))"
          else
            URL="${{ matrix.channel.url }}"
            REV=$(curl -sL "$URL/git-revision")
            DISPLAY="${URL##*/} @ ${REV:0:12} ($(date -u +%Y-%m-%d))"
          fi
          echo "url=$URL"      >> "$GITHUB_OUTPUT"
          echo "rev=$REV"      >> "$GITHUB_OUTPUT"
          echo "label=$DISPLAY" >> "$GITHUB_OUTPUT"

      - name: Download shard JSONLs
        uses: actions/download-artifact@v8
        with:
          pattern: shard-${{ matrix.channel.label }}-*
          path: ${{ matrix.channel.label }}-shards/

      - name: Merge shard JSONLs
        run: |
          CHANNEL=${{ matrix.channel.label }}
          mkdir -p "$CHANNEL"
          # Each downloaded artifact lands in its own subdir named
          # shard-<channel>-<N>/full.jsonl. Concatenate them all.
          find "$CHANNEL-shards" -name full.jsonl -print0 | xargs -0 cat > "$CHANNEL/full.jsonl"
          wc -l "$CHANNEL/full.jsonl"

      - name: Aggregate Tier 1 (${{ matrix.channel.label }})
        run: |
          uv run scripts/aggregate-scan.py ${{ matrix.channel.label }}/full.jsonl \
            --out ${{ matrix.channel.label }}/REPORT.md \
            --summary-json ${{ matrix.channel.label }}/summary.json \
            --direct-failing-csv ${{ matrix.channel.label }}/direct-failing.csv \
            --channel-label '${{ steps.channel.outputs.label }}'

      - name: Compute Tier 2 load-time dependents (${{ matrix.channel.label }})
        run: |
          uv run scripts/compute-load-time-dependents.py \
            ${{ matrix.channel.label }}/full.jsonl \
            ${{ matrix.channel.label }}/direct-failing.csv \
            --out-csv ${{ matrix.channel.label }}/load-time-dependents.csv \
            --out-summary ${{ matrix.channel.label }}/load-time-summary.json \
            --out-section ${{ matrix.channel.label }}/load-time-section.md

      - name: Compute Tier 3 build-time dependents (${{ matrix.channel.label }})
        env:
          # Let the evaluator successfully walk unfree + insecure packages
          # (users with `allowUnfree = true` / `permittedInsecurePackages`
          # DO build these, so their build-time edges to failing seeds
          # are real). Deliberately NOT setting NIXPKGS_ALLOW_BROKEN (by
          # definition broken = won't build anyway, so a failing-seed
          # edge adds no information) or NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM
          # (would evaluate ~30k linux-only packages on darwin that can't
          # build on darwin regardless — pure noise, no signal).
          NIXPKGS_ALLOW_UNFREE: '1'
          NIXPKGS_ALLOW_INSECURE: '1'
        run: |
          # ubuntu-latest is 2 vCPU / 7 GB. Tuning for that shape:
          # * --eval-workers 2 matches the core count (nix evaluator is
          #   single-threaded per worker; more workers = scheduler
          #   contention + more Boehm GC arenas).
          # * --nix-eval-max-memory 3072: 2 workers × 3 GB = 6 GB ceiling,
          #   leaves 1 GB for the rest of the runner.
          uv run scripts/compute-build-time-dependents.py \
            --nixpkgs-flake github:nixos/nixpkgs/${{ steps.channel.outputs.rev }} \
            --direct-failing-csv ${{ matrix.channel.label }}/direct-failing.csv \
            --out-csv ${{ matrix.channel.label }}/build-time-dependents.csv \
            --out-summary ${{ matrix.channel.label }}/build-time-summary.json \
            --out-section ${{ matrix.channel.label }}/build-time-section.md \
            --eval-workers 2 \
            --nix-eval-max-memory 3072

      - name: Render channel REPORT with all tier sections (${{ matrix.channel.label }})
        run: |
          uv run scripts/render-channel-report.py \
            --report ${{ matrix.channel.label }}/REPORT.md \
            --tier2-section ${{ matrix.channel.label }}/load-time-section.md \
            --tier3-section ${{ matrix.channel.label }}/build-time-section.md \
            --tier2-summary ${{ matrix.channel.label }}/load-time-summary.json \
            --tier3-summary ${{ matrix.channel.label }}/build-time-summary.json

      - name: Verify scanner findings (${{ matrix.channel.label }})
        run: |
          uv run scripts/verify-failures.py \
            --failing-csv ${{ matrix.channel.label }}/direct-failing.csv \
            --jsonl ${{ matrix.channel.label }}/full.jsonl \
            --out ${{ matrix.channel.label }}/verify-results.jsonl \
            --summary ${{ matrix.channel.label }}/verify-summary.md

      - name: Upload channel outputs (${{ matrix.channel.label }})
        uses: actions/upload-artifact@v7
        with:
          name: channel-${{ matrix.channel.label }}
          path: ${{ matrix.channel.label }}/
          retention-days: 30

      - name: Fail loudly if scanner ↔ verifier disagree (${{ matrix.channel.label }})
        run: |
          if grep -q '^No disagreements' ${{ matrix.channel.label }}/verify-summary.md; then
            echo 'scanner ↔ verifier: 100% agreement'
          else
            echo '::error::Scanner-verifier disagreement detected in ${{ matrix.channel.label }}. See verify-summary.md.'
            exit 1
          fi

  combine:
    name: combine + commit
    needs: analyze
    # Defensive guard: combine pushes to origin/main, so it must only run
    # when triggered against main itself (scheduled cron or manual
    # dispatch on main). Workflow_dispatch on a feature branch lets us
    # exercise eval-release-paths + scan + analyze end-to-end without the
    # commit step accidentally fast-forwarding main onto the branch.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest
          cache-dependency-glob: 'scripts/*.py'

      - name: Download darwin outputs
        uses: actions/download-artifact@v8
        with:
          name: channel-darwin
          path: darwin/

      - name: Download release outputs
        uses: actions/download-artifact@v8
        with:
          name: channel-release
          path: release/

      - name: Download unstable outputs
        uses: actions/download-artifact@v8
        with:
          name: channel-unstable
          path: unstable/

      - name: Combine
        run: |
          uv run scripts/combine-reports.py \
            --channel darwin:darwin/summary.json \
            --channel release:release/summary.json \
            --channel unstable:unstable/summary.json \
            --channel-tier2 darwin:darwin/load-time-summary.json \
            --channel-tier2 release:release/load-time-summary.json \
            --channel-tier2 unstable:unstable/load-time-summary.json \
            --channel-tier3 darwin:darwin/build-time-summary.json \
            --channel-tier3 release:release/build-time-summary.json \
            --channel-tier3 unstable:unstable/build-time-summary.json \
            --out REPORT.md \
            --summary-json summary.json

      - name: Commit outputs
        run: |
          git config user.name  'scan-bot'
          git config user.email 'scan-bot@users.noreply.github.com'
          git add darwin/ release/ unstable/ REPORT.md summary.json
          if git diff --staged --quiet; then
            echo 'no result changes'
            exit 0
          fi
          git commit -m "auto: tri-channel scan

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Main may have moved while this run was in flight (either a
          # code/workflow push or a manual regen of the scan outputs).
          # Rebase the scan commit onto whatever main is now, then push.
          #
          # REPORT.md and summary.json are deterministic regens from the
          # per-channel inputs in darwin/, release/, and unstable/, so
          # conflicts on those two files are auto-resolved in favor of this run's
          # version (`--theirs` during rebase = the commit being replayed
          # = the scan's fresh output). Any OTHER conflict halts the job
          # so a human can inspect — that's unexpected and worth looking
          # into. Retry for concurrent push races AND transient GitHub-side
          # push failures (500 Internal Server Error), which can persist for
          # minutes — so back off exponentially (15s, 30s, 60s, 120s) across
          # 5 attempts rather than hammering with a flat short delay.
          max_attempts=5
          for attempt in $(seq 1 "$max_attempts"); do
            if git pull --rebase origin main; then
              if git push origin main; then
                exit 0
              fi
            else
              # Rebase hit a conflict. Auto-resolve only on the two
              # deterministic top-level files; bail on anything else.
              conflicted=$(git diff --name-only --diff-filter=U)
              unexpected=$(echo "$conflicted" | grep -vE '^(REPORT\.md|summary\.json)$' || true)
              if [[ -n "$unexpected" ]]; then
                echo "::error::unexpected rebase conflict(s): $unexpected"
                git rebase --abort
                exit 1
              fi
              git checkout --theirs -- REPORT.md summary.json
              git add REPORT.md summary.json
              GIT_EDITOR=true git rebase --continue
              if git push origin main; then
                exit 0
              fi
            fi
            if [[ "$attempt" -lt "$max_attempts" ]]; then
              backoff=$(( 15 * 2 ** (attempt - 1) ))
              echo "push attempt $attempt/$max_attempts failed, retrying in ${backoff}s..."
              sleep "$backoff"
            fi
          done
          echo "::error::combine+commit push failed after $max_attempts attempts"
          exit 1
